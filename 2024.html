<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohře 2024 – Návrat na západ</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f0fdf4; color: #1a4731; line-height: 1.7; }

        /* Navigace */
        .nav-bar { position: sticky; top: 0; z-index: 900; background: rgba(255, 255, 255, 0.98); padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #27ae60; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { background: linear-gradient(45deg, #2980b9, #27ae60); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.4s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }

        header { background: linear-gradient(135deg, #1e3c72, #2a5298, #27ae60); color: white; text-align: center; padding: 60px 20px; }
        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        .card { background: white; border-radius: 25px; padding: 40px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #d1fae5; transition: 0.4s; }
        .card:hover { transform: translateY(-5px); }
        
        h2 { color: #2980b9; }
        .mapa { width: 100%; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); margin-top: 20px; }
        
        /* Galerie */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .gallery img { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; cursor: pointer; transition: 0.5s; border: 3px solid white; background-color: #eee; }
        .gallery img:hover { transform: scale(1.05) rotate(1deg); border-color: #27ae60; }

        /* Lightbox */
        .lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .lightbox-content { position: relative; max-width: 90%; max-height: 90%; }
        .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 15px; border: 4px solid white; display: block; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 4rem; cursor: pointer; padding: 20px; z-index: 1001; }
        .prev { left: -60px; }
        .next { right: -60px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="btn">⬅ Zpět</a>
    <strong>Ohře 2024: T-LAMA V AKCI</strong>
</nav>

<header>
    <h1>Ohře 2024</h1>
    <p>Návrat na západ ve velkém stylu!</p>
</header>

<div class="container">
    <div class="card">
        <h2>Galerie</h2>
        <div class="gallery" id="galerie2024"></div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <span class="nav-btn prev" onclick="changeImage(-1)">❮</span>
    <div class="lightbox-content">
        <img id="lightbox-img" src="" alt="Detail">
    </div>
    <span class="nav-btn next" onclick="changeImage(1)">❯</span>
</div>

<script>
    const galerie = document.getElementById('galerie2024');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    
    // TADY SE TVOŘÍ SEZNAM VŠECH FOTEK
    // První cyklus přidá 1.jpeg až 49.jpeg
    // Druhý cyklus přidá b1.jpeg až b34.jpeg
    const fotky = [];
    for(let i = 1; i <= 49; i++) fotky.push(`fotky/2024/${i}.jpeg`);
    for(let i = 1; i <= 34; i++) fotky.push(`fotky/2024/b${i}.jpeg`);

    let currentIndex = 0;

    // Vložení fotek do stránky
    fotky.forEach((cesta, index) => {
        const img = document.createElement('img');
        img.src = cesta;
        img.loading = "lazy";
        img.onclick = () => { showLightbox(index); };
        galerie.appendChild(img);
    });

    function showLightbox(index) {
        currentIndex = index;
        lightboxImg.src = fotky[currentIndex];
        lightbox.classList.add('active');
    }

    function changeImage(step) {
        currentIndex = (currentIndex + step + fotky.length) % fotky.length;
        lightboxImg.src = fotky[currentIndex];
    }

    lightbox.onclick = (e) => { if(e.target === lightbox) lightbox.classList.remove('active'); };
</script>
</body>
</html>
