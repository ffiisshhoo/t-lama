<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohře 2024 – Návrat na západ</title>

<style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; color: #333; line-height: 1.7; }
    
    /* Navigace a Header */
    .nav-bar { position: sticky; top: 0; z-index: 900; background: #fff; padding: 15px 30px; display: flex; align-items: center; border-bottom: 2px solid #1b7fbd; }
    .btn { background: #1b7fbd; color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-right: 20px; }
    header { background: linear-gradient(135deg,#0b4f6c,#1b7fbd); color: white; text-align: center; padding: 60px 20px; }
    
    .container { max-width: 1200px; margin: auto; padding: 40px 20px; }
    .card { background: white; border-radius: 20px; padding: 35px; margin-bottom: 35px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    
    /* Galerie */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .gallery img, .gallery video { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; cursor: pointer; transition: 0.3s; }
    .gallery img:hover, .gallery video:hover { transform: scale(1.03); }

    /* Lightbox */
    .lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
    .lightbox.active { display: flex; }
    .lightbox-content { position: relative; max-width: 90%; max-height: 90%; }
    .lightbox img, .lightbox video { max-width: 100%; max-height: 85vh; border-radius: 15px; border: 4px solid white; }
    
    /* Vodoznak */
    .watermark { position: absolute; bottom: 15px; right: 15px; color: rgba(255,255,255,0.6); font-weight: bold; font-size: 1.2rem; pointer-events: none; }
    
    /* Šipky */
    .nav-btn { position: absolute; top: 50%; color: white; font-size: 3rem; cursor: pointer; padding: 20px; user-select: none; }
    .prev { left: -60px; }
    .next { right: -60px; }
</style>
</head>

<body>

<nav class="nav-bar">
    <a href="index.html" class="btn">⬅ Zpět</a>
    <strong>Ohře 2024: T-LAMA V AKCI</strong>
</nav>

<header>
    <h1>Ohře 2024</h1>
    <p>Návrat na západ 🚣‍♂️🌊🏰</p>
</header>

<div class="container">
    <div class="card">
        <h2>Fotogalerie</h2>
        <div class="gallery" id="galerie2024"></div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <span class="nav-btn prev" onclick="changeImage(-1)">❮</span>
    <div class="lightbox-content">
        <img id="lightbox-img" style="display:none;">
        <video id="lightbox-video" controls style="display:none;"></video>
        <div class="watermark">© T-LAMA TEAM</div>
    </div>
    <span class="nav-btn next" onclick="changeImage(1)">❯</span>
</div>

<script>
    const galerie = document.getElementById('galerie2024');
    const lightbox = document.getElementById('lightbox');
    const lImg = document.getElementById('lightbox-img');
    const lVid = document.getElementById('lightbox-video');
    
    const media = [];
    for(let i = 1; i <= 49; i++) media.push(`fotky/2024/${i}.jpeg`);
    for(let i = 1; i <= 34; i++) {
        let ext = (i >= 30) ? '.mp4' : '.jpeg';
        media.push(`fotky/2024/b${i}${ext}`);
    }

    let currentIndex = 0;

    media.forEach((cesta, index) => {
        let el = cesta.endsWith('.mp4') ? document.createElement('video') : document.createElement('img');
        el.src = cesta;
        el.onclick = () => { showLightbox(index); };
        galerie.appendChild(el);
    });

    function showLightbox(index) {
        currentIndex = index;
        const cesta = media[currentIndex];
        if (cesta.endsWith('.mp4')) {
            lImg.style.display = 'none';
            lVid.style.display = 'block';
            lVid.src = cesta;
        } else {
            lVid.style.display = 'none';
            lImg.style.display = 'block';
            lImg.src = cesta;
        }
        lightbox.classList.add('active');
    }

    function changeImage(step) {
        currentIndex = (currentIndex + step + media.length) % media.length;
        showLightbox(currentIndex);
    }

    lightbox.onclick = (e) => { if(e.target === lightbox) lightbox.classList.remove('active'); };
</script>

</body>
</html>
