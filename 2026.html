<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vltava 2026 | T-LAMA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial, sans-serif;
    color:white;
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("fotky/2024/mapa2024.png") center/cover no-repeat;
    overflow:hidden;
}

.container{
    padding:30px;
}

h1{
    font-size:clamp(3rem, 8vw, 6rem);
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(0,0,0,0.7);
}

h2{
    font-size:clamp(1.5rem, 4vw, 2.5rem);
    margin-bottom:30px;
    text-shadow:0 0 15px rgba(0,0,0,0.7);
}

.coming{
    font-size:clamp(2rem, 6vw, 4rem);
    font-weight:bold;
    color:#ffd700;
    text-transform:uppercase;
    animation:blink 1.2s infinite;
    text-shadow:0 0 20px #ffd700;
}

@keyframes blink{
    0%,100%{
        opacity:1;
        transform:scale(1);
    }
    50%{
        opacity:0.3;
        transform:scale(1.08);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>🌊 Vltava 2026 🦙</h1>
    <h2>Těšíme se na letošní plavbu<br>26.–29. 6. 2026</h2>
    <div class="coming">It's Coming...</div>
</div>

</body>
</html>
