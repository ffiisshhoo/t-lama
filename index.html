<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Lama z Podmezí</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    min-height: 100vh;
}

.nadpis {
    text-align: center;
    font-size: 70px;
    color: #d85f98;
    margin-top: 30px;
    margin-bottom: 0;
}

.podnadpis {
    text-align: center;
    font-size: 36px;
    color: #6a513a;
    margin-bottom: 40px;
    font-weight: bold;
}

.obsah {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    padding: 20px;
}

.logo {
    width: 300px;
    max-width: 25vw;
    opacity: 0.9;
}

.logo-mobile {
    display: none;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    text-align: center;
    min-width: 350px;
}

.card h2 {
    color: #6a513a;
    margin-top: 0;
    font-size: 36px;
}

ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

li {
    margin: 18px 0;
    font-size: 30px;
}

a {
    text-decoration: none;
    color: #333;
    transition: 0.3s;
}

a:hover {
    color: #d85f98;
}

.footer {
    text-align: center;
    color: #777;
    margin-top: 30px;
    margin-bottom: 30px;
    font-size: 18px;
}

/* MOBIL */
@media (max-width: 900px) {

    .nadpis {
        font-size: 50px;
        padding: 0 10px;
    }

    .podnadpis {
        font-size: 28px;
        margin-bottom: 25px;
    }

    .obsah {
        display: block;
        padding: 15px;
    }

    .logo {
        display: none;
    }

    .logo-mobile {
        display: block;
        width: 280px;
        max-width: 80%;
        margin: 35px auto;
    }

    .card {
        min-width: auto;
        padding: 25px;
    }

    .card h2 {
        font-size: 28px;
    }

    li {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<h1 class="nadpis">🦙 T-Lama</h1>
<div class="podnadpis">z Podmezí</div>

<div class="obsah">

    <img class="logo" src="web_images/tlama.png" alt="T-Lama">

    <div class="card">
        <h2>🛶 Kde všude už jsme pluli</h2>

        <ul>
            <li><a href="2020.html">2020 – Berounka</a></li>
            <li><a href="2021.html">2021 – Vltava</a></li>
            <li><a href="2022.html">2022 – Otava</a></li>
            <li><a href="2023.html">2023 – Berounka</a></li>
            <li><a href="2024.html">2024 – Ohře</a></li>
            <li><a href="2025.html">2025 – Ohře</a></li>
            <li><a href="2026.html">2026 – Vltava</a></li>
        </ul>
    </div>

    <img class="logo" src="web_images/tlama.png" alt="T-Lama">

</div>

<img class="logo-mobile" src="web_images/tlama.png" alt="T-Lama">

<div class="footer">
    ❤️ Každý rok spolu na vodě ❤️
</div>

</body>
</html>
