<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vltava 2021</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    color:#333;
}

header{
    background:#0b4f6c;
    color:white;
    padding:40px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:48px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.back-button{
    display:inline-block;
    background:#0b4f6c;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:10px;
    margin:20px 0;
    font-weight:bold;
    transition:0.3s;
}

.back-button:hover{
    background:#146b8c;
}

.text{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    line-height:1.8;
    margin-bottom:30px;
}

.mapa{
    text-align:center;
    margin-bottom:40px;
}

.mapa img{
    width:100%;
    max-width:1000px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.galerie{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.galerie img,
.galerie video{
    width:100%;
    height: 200px; /* Sjednocení výšky v mřížce */
    object-fit: cover; /* Aby se fotky/videa nedeformovaly */
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
    transition:0.3s;
    cursor:pointer;
}

.galerie img:hover,
.galerie video:hover{
    transform:scale(1.03);
}

footer{
    text-align:center;
    padding:30px;
    color:#666;
}

.lightbox{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.92);
    justify-content:center;
    align-items:center;
}

.lightbox-wrapper{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    max-width:90%;
    max-height:85%;
}

.lightbox img,
.lightbox video{
    max-width:100%;
    max-height:85vh;
    border-radius:15px;
    display:none; /* Výchozí stav, JS zapne správné médium */
}

.close,
.prev,
.next{
    position:absolute;
    color:white;
    font-size:50px;
    cursor:pointer;
    user-select:none;
    z-index: 10000;
}

.close{
    top:20px;
    right:30px;
}

.prev{
