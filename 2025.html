<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohře 2025 | T-LAMA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; color:#333; line-height:1.6; }
        
        .sticky-back { position:fixed; top:20px; left:20px; z-index:9999; background:#0b4f7d; color:white; padding:12px 25px; border-radius:10px; text-decoration:none; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.3); transition:0.3s; }
        .sticky-back:hover { background:#1f7fc5; transform:scale(1.05); }

        .hero { background:linear-gradient(135deg,#0b4f7d,#1f7fc5); color:white; text-align:center; padding:100px 20px; }
        .container { max-width:1100px; margin:auto; padding:40px 20px; }
        .card { background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); margin-bottom:40px; }
        
        /* INTERAKTIVNÍ GALERIE */
        .gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
        .gallery img { width:100%; height:200px; object-fit:cover; border-radius:15px; cursor:pointer; transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gallery img:hover { transform:scale(1.08) rotate(2deg); box-shadow:0 15px 30px rgba(0,0,0,0.2); }
        
        /* LIGHTBOX S KŘÍŽKEM */
        .lightbox { display:none; position:fixed; z-index:10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; }
        .lightbox-content { position:relative; display:inline-block; }
        .lightbox img { max-width:85vw; max-height:85vh; border:5px solid white; border-radius:10px; }
        
        .close-btn { position:absolute; top:-40px; right:0; color:white; font-size:30px; cursor:pointer; font-weight:bold; }
        .nav-btn { position:absolute; top:50%; color:white; font-size:50px; cursor:pointer; padding:20px; user-select:none; }
        .prev { left:-60px; }
        .next { right:-60px; }
        
        .watermark { position:absolute; bottom:15px; right:15px; color:rgba(255,255,255,0.7); font-size:1.2rem; pointer-events:none; text-shadow:1px 1px 2px black; }
    </style>
</head>
<body>

<a href="index.html" class="sticky-back">← Zpět</a>

<header class="hero">
    <h1>OHŘE 2025</h1>
</header>

<div class="container">
    <div class="card">
        <h2>📸 Fotogalerie</h2>
        <div class="gallery" id="gallery"></div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <div class="close-btn" onclick="closeLightbox()">&times;</div>
    <div class="nav-btn prev" onclick="changeImage(-1)">&#10094;</div>
    <div class="lightbox-content">
        <img id="lightbox-img">
        <div class="watermark">Ohře 2025</div>
    </div>
    <div class="nav-btn next" onclick="changeImage(1)">&#10095;</div>
</div>

<script>
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = 0;
    
    // Vygeneruje pole 1 až 58
    const fileNames = Array.from({length: 58}, (_, i) => i + 1);

    fileNames.forEach((num, index) => {
        const img = document.createElement('img');
        img.src = `fotky/2025/${num}.jpeg`;
        img.onclick = () => { currentIndex = index; lightboxImg.src = img.src; lightbox.style.display = 'flex'; };
        gallery.appendChild(img);
    });

    function changeImage(step) {
        currentIndex = (currentIndex + step + fileNames.length) % fileNames.length;
        lightboxImg.src = `fotky/2025/${fileNames[currentIndex]}.jpeg`;
    }
    function closeLightbox() { lightbox.style.display = 'none'; }
    document.onkeydown = (e) => { if(e.key === 'Escape') closeLightbox(); if(e.key === 'ArrowLeft') changeImage(-1); if(e.key === 'ArrowRight') changeImage(1); };
</script>
</body>
</html>
